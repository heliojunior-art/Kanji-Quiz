<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Quiz</title>

    <!-- Bootstrap CSS v5.3.0 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            color: #334155;
        }
        .card {
            border-radius: 20px;
        }
        .font-japanese {
            font-family: "Yu Mincho", "MS Mincho", "Hiragino Mincho ProN", serif;
        }
        
        .fade-slide {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark mb-4 shadow-sm py-3" style="line-height: 1;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center text-white text-decoration-none" href="{% url 'home' %}" style="font-size: 26px; letter-spacing: 0.5px; font-weight: 700;">
            <span class="me-2" style="line-height: 1;">📘</span> Kanji Quiz
        </a>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
