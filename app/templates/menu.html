{% extends "base.html" %}
{% block content %}

<!-- Contêiner principal que força o alinhamento vertical e horizontal centralizado em qualquer monitor -->
<div class="d-flex justify-content-center align-items-center py-4" style="min-height: 75vh;">
    
    <!-- Card com tamanho ligeiramente ampliado e sombras mais suaves (Design Premium) -->
    <div class="card w-100 p-4 p-sm-5 border-0 shadow-lg" style="max-width: 500px; background: #ffffff;">
        
        <h2 class="text-center font-weight-bold mb-4 text-dark" style="letter-spacing: 0.5px;">
            Iniciar Quiz 🎯
        </h2>

        <!-- Exibição de Alerta de Erro (Caso o nível esteja vazio no banco) -->
        {% if erro %}
        <div class="alert alert-danger text-center rounded-3 mb-4 py-2" style="font-size: 14px;">
            {{ erro }}
        </div>
        {% endif %}

        <form method="post" action="">
            {% csrf_token %}
            
            <!-- Campo de Seleção do Nível JLPT -->
            <div class="mb-3">
                <label class="form-label text-muted font-weight-bold small text-uppercase" style="letter-spacing: 0.5px;">
                    Selecione o nível:
                </label>
                <select name="nivel" class="form-select form-select-lg" style="font-size: 16px; border-radius: 12px; cursor: pointer;">
                    <option value="N5">N5 (Iniciante)</option>
                    <option value="N4">N4 (Básico)</option>
                    <option value="N3">N3 (Intermediário)</option>
                    <option value="N2">N2 (Avançado)</option>
                    <option value="N1">N1 (Fluente)</option>
                </select>
            </div>

            <!-- Campo de Seleção da Quantidade de Questões -->
            <div class="mb-4">
                <label class="form-label text-muted font-weight-bold small text-uppercase" style="letter-spacing: 0.5px;">
                    Quantidade de Kanjis:
                </label>
                <select name="quantidade" class="form-select form-select-lg" style="font-size: 16px; border-radius: 12px; cursor: pointer;">
                    <option value="10">10 Questões</option>
                    <option value="20">20 Questões</option>
                    <option value="30">30 Questões</option>
                </select>
            </div>

            <!-- Botão Começar (Estilo Duolingo Roxo/Azul Premium com feedback de clique) -->
            <button class="btn btn-primary w-100 py-3 font-weight-bold shadow-sm mb-3" 
                    style="font-size: 18px; border-radius: 14px; background-color: #4f46e5; border-color: #4f46e5; transition: all 0.2s;">
                🚀 Começar Quiz
            </button>
        </form>

        <!-- Divisor Visual Elegante -->
        <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1 my-0 text-muted opacity-25">
            <span class="mx-3 text-muted text-uppercase font-weight-bold" style="font-size: 11px; letter-spacing: 1px;">Ou consulte</span>
            <hr class="flex-grow-1 my-0 text-muted opacity-25">
        </div>

        <!-- Link para a Biblioteca (Mais limpo e integrado) -->
        <a href="{% url 'biblioteca' %}" class="btn btn-light w-100 py-3 font-weight-bold border text-secondary" 
           style="font-size: 16px; border-radius: 14px; background-color: #f8fafc; transition: all 0.2s;">
            📖 Biblioteca de Kanjis
        </a>
    </div>
</div>

{% endblock %}
