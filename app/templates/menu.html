{% extends "base.html" %}
{% block content %}

<div class="card mx-auto p-4 shadow" style="max-width: 480px;">
    <h2 class="text-center mb-4">
        Iniciar Quiz
    </h2>

    <form method="post" action="">
        {% csrf_token %}
        <label class="mb-1">
            Selecione o nível:
        </label>

        <select name="nivel" class="form-select mb-3">
            <option value="N5">N5</option>
            <option value="N4">N4</option>
            <option value="N3">N3</option>
            <option value="N2">N2</option>
            <option value="N1">N1</option>
        </select>

        <label class="mb-1">Quantidade</label>
            <select name="quantidade" class="form-select mb-4">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
        </select>

        <button class="btn btn-primary w-100 py-3 fs-5">
            Começar
        </button>
    </form>

    <a href="/biblioteca/" class="btn btn-secondary w-100 mt-4 py-3 fs-5">
        Biblioteca de Kanjis
    </a>
</div>

{% endblock %}
