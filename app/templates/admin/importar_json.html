{% extends "admin/base_site.html" %}
{% block content %}
<div id="content-main">
    <h2>Importar Kanjis via Arquivo JSON</h2>
    <p>Selecione o arquivo <strong>kanjis.json</strong> oficial do projeto para alimentar ou atualizar as tabelas do simulador.</p>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin: 20px 0;">
            {{ form.as_p }}
        </div>
        <input type="submit" value="Iniciar Importação" class="default" style="background: #79aec8; color: #fff; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        <a href=".." class="button" style="margin-left: 10px; background: #eaeaea; color: #333; padding: 10px 20px; text-decoration: none; border-radius: 4px;">Cancelar</a>
    </form>
</div>
{% endblock %}
